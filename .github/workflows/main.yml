name: Sniper Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install jq -y

      - name: Run Sniper Update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Starting updating the file..."
          node main.js

      - name: Check for Changes
        id: git-check
        run: |
          if ! git diff --exit-code emotedata.json animationdata.json; then
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push Changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add emotedata.json animationdata.json
          git commit -m "🤖 Auto update emotes & animations - $(date '+%Y-%m-%d %H:%M:%S UTC')"
          git push

      - name: Log Update Results
        run: |
          for FILE in emotedata.json animationdata.json; do
            echo "--- $FILE ---"
            if [ -f "$FILE" ]; then
              TOTAL_ITEMS=$(jq '.totalItems' "$FILE")
              LAST_UPDATE=$(jq -r '.lastUpdate' "$FILE")
              echo "Update completed"
              echo "Total items: $TOTAL_ITEMS"
              echo "Last update: $LAST_UPDATE"
            else
              echo "⚠️ $FILE not found"
            fi
          done

      - name: Update README with Total Emotes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          EMOTES=$(jq '.totalItems' emotedata.json)
          ANIMATIONS=$(jq '.totalItems' animationdata.json)

          sed -i "s/Total emotes: \`[0-9]*\`/Total emotes: \`$EMOTES\`/g" README.md
          sed -i "s/Total animations: \`[0-9]*\`/Total animations: \`$ANIMATIONS\`/g" README.md

          git add README.md
          git commit --amend --no-edit
          git push --force-with-lease
